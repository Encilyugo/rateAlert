name: Check FX Rates

on:
  schedule:
    # 默认时区 Asia/Shanghai (UTC+8，无夏令时)
    # UTC 00:00-14:00 周一到周五 = 北京时间 08:00-22:00 周一到周五
    # 每小时跑一次：日报窗口 08:00-09:59 必命中、突然变化/极值检测最长 1 小时延迟
    - cron: '0 0-14 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run check
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
        run: python check_rates.py

      - name: Commit state and history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json history.json
          git diff --cached --quiet || git commit -m "Update state [skip ci]"
          git push
