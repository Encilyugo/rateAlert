name: Check FX Rates

on:
  schedule:
    # 默认时区 Asia/Shanghai (UTC+8，无夏令时)
    # UTC 00:00-03:30 周一到周五 = 北京时间 08:00-11:30 周一到周五
    # 每 30 分钟跑一次，确保上午日报窗口至少命中一次（GitHub schedule 会延迟/丢弃，加密冗余）
    - cron: '0,30 0-3 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run check
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
        run: python check_rates.py

      - name: Commit state and history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json history.json
          git diff --cached --quiet || git commit -m "Update state [skip ci]"
          git push
